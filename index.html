<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <meta
      name="description"
      content="اكتشف كل ما يخص عالم الكمبيوتر في PcBench Builder. مراجعات لأحدث قطع الهاردوير، تجميعات كمبيوتر للألعاب والعمل، شروحات صيانة، وحلول لأشهر مشاكل التشغيل والويندوز."
    />
    <meta
      property="og:title"
      content="Kearon | دليلك الشامل لعالم الكمبيوتر والتقنية"
    />
    <meta
      property="og:description"
      content="مراجعات هاردوير، تجميعات كمبيوتر، وشروحات صيانة مبسطة تناسب المبتدئين والمحترفين."
    />
    <meta
      property="og:image"
      content="https://www.yourwebsite.com/images/og-image.jpg"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta property="og:url" content="https://www.yourwebsite.com" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="style.css" />
    <title>Kearon Pc Build</title>
  </head>
  <body>
    <header>
      <nav class="utility-nav">
        <div class="container">
          <ul class="utility-links">
            <li>
              <button id="themeToggle" class="theme-btn">
                <i class="fa-solid fa-moon"></i>
              </button>
            </li>
            <li><a class="utility-link" href="/support">الدعم الفني</a></li>
            <li><a class="utility-link" href="/signup">تسجيل الدخول</a></li>
            <li>
              <select
                class="lang-selector"
                name="language"
                aria-label="اختر اللغة"
              >
                <option value="ar">العربية</option>
                <option value="en">English</option>
              </select>
            </li>
          </ul>
        </div>
      </nav>
      <div class="container header-container">
        <a href="#" class="logo">
          <span class="name">elKaeron</span>
          PcBenchPro</a
        >
        <ul class="header-links">
          <li><a class="header-link" href="#">الرئيسية</a></li>
          <li><a class="header-link" href="#">Pc Builder</a></li>
          <li><a class="header-link" href="#">Bottleneck</a></li>
          <li><a class="header-link" href="#">Upgrade Path</a></li>
          <li><a class="header-link" href="#">FPS Predictor</a></li>
          <li><a class="header-link" href="#">Future Proof</a></li>
          <li><a class="header-link" href="#">Compare Builds</a></li>
        </ul>
        <div class="header-actions">
          <button type="button" class="header-btn">تسجيل مجاني</button>
        </div>
      </div>
    </header>
    <section class="hero">
      <div class="container hero-container">
        <div class="hero-content">
          <h1 class="hero-heading">
            المنصة العالمية
            <span class="highlight">اختبارات PC</span>
          </h1>
          <p class="hero-desc">قرارات ذكية مبنية على بيانات حقيقية</p>
          <div class="hero-btns">
            <button type="button" class="hero-btn btn-primary">
              ابدأ تجميعتك
              <span class="arrow">
                <i class="fa-solid fa-arrow-left"></i>
              </span>
            </button>
            <button type="button" class="hero-btn btn-secondary">
              جرب الـ AI Assistant
            </button>
          </div>
        </div>
      </div>
    </section>
    <script src="main.js"></script>
  </body>
</html>
